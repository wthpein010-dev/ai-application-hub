<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&#26379;&#21451;&#22280;&#21457;&#22270;&#31070;&#22120;&#28436;&#31034;&#35270;&#39057;</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0d12; --panel:#171b24; --line:rgba(255,255,255,.13); --text:#f6f7fb; --muted:#aeb7c9; --blue:#5b8cff; --green:#24b47e; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at 18% 14%,rgba(91,140,255,.28),transparent 30rem),var(--bg); color:var(--text); font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif; letter-spacing:0; }
    .home-link { position:fixed; top:18px; left:18px; z-index:20; display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:0 14px; border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:14px; font-weight:800; text-decoration:none; background:rgba(23,27,36,.84); box-shadow:0 16px 40px rgba(0,0,0,.28); backdrop-filter:blur(14px); }
    .shell { width:min(1000px,calc(100% - 36px)); margin:0 auto; padding:78px 0 34px; }
    .panel { border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:20px; box-shadow:0 24px 80px rgba(0,0,0,.32); }
    h1 { margin:0 0 10px; font-size:clamp(28px,5vw,46px); letter-spacing:0; }
    p { margin:0; color:var(--muted); line-height:1.7; }
    .video-shell { display:grid; place-items:center; min-height:min(62vh,620px); margin-top:16px; border-radius:8px; background:linear-gradient(135deg,#101826,#0f172a); overflow:hidden; }
    video { display:none; width:100%; max-height:72vh; background:#000; }
    .load-card { width:min(520px,100%); padding:22px; text-align:center; }
    .load-card strong { display:block; margin-bottom:8px; font-size:22px; }
    .links { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .btn, button.btn { min-height:38px; padding:9px 12px; border-radius:8px; border:1px solid var(--line); color:inherit; background:rgba(255,255,255,.07); text-decoration:none; font:inherit; cursor:pointer; }
    .btn.primary { background:var(--blue); border-color:transparent; font-weight:800; }
  </style>
</head>
<body>
  <a class="home-link" href="../../../index.html">&#36820;&#22238;&#20027;&#39029;</a>
  <main class="shell">
    <section class="panel">
      <h1>&#26379;&#21451;&#22280;&#21457;&#22270;&#31070;&#22120;&#28436;&#31034;&#35270;&#39057;</h1>
      <p>&#20808;&#25171;&#24320;&#36731;&#37327;&#35270;&#39057;&#39029;&#65292;&#28857;&#20987;&#21518;&#20877;&#21152;&#36733; MP4&#65292;&#20943;&#23569;&#39318;&#27425;&#36827;&#20837;&#26102;&#30340;&#31561;&#24453;&#12290;</p>
      <div class="video-shell">
        <div class="load-card" id="loadCard">
          <strong>&#20934;&#22791;&#25773;&#25918;&#28436;&#31034;&#35270;&#39057;</strong>
          <p>&#28857;&#20987;&#19979;&#26041;&#25353;&#38062;&#21518;&#24320;&#22987;&#21152;&#36733;&#35270;&#39057;&#25991;&#20214;&#12290;</p>
        </div>
        <video id="introVideo" controls playsinline data-src="./travel-generator-demo.mp4"></video>
      </div>
      <div class="links">
        <button id="loadVideo" class="btn primary" type="button">&#21152;&#36733;&#35270;&#39057;</button>
        <a class="btn" href="./travel-generator-demo.mp4">&#25171;&#24320;&#35270;&#39057;&#25991;&#20214;</a>
        <a class="btn" href="../01_%E4%BD%9C%E5%93%81%E4%BD%93%E9%AA%8C%E5%85%A5%E5%8F%A3/app/index.html">&#25171;&#24320;&#20316;&#21697;</a>
        <a class="btn" href="../../../index.html">&#36820;&#22238;&#20027;&#39029;</a>
      </div>
    </section>
  </main>
  <script>
    const button = document.querySelector("#loadVideo");
    const video = document.querySelector("#introVideo");
    const card = document.querySelector("#loadCard");
    button.addEventListener("click", () => {
      if (!video.src) {
        video.src = video.dataset.src;
        video.style.display = "block";
        card.style.display = "none";
        button.textContent = "\u64ad\u653e\u89c6\u9891";
      }
      video.play().catch(() => video.load());
    });
  </script>
</body>
</html>
