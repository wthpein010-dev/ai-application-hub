<!doctype html>

  <style>
    :root { color-scheme: dark; --bg:#090d16; --panel:#141b29; --line:rgba(255,255,255,.14); --text:#f8fafc; --muted:#aeb8cc; --blue:#5b8cff; --green:#2dd4bf; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--text); font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif; background:radial-gradient(circle at 18% 14%,rgba(91,140,255,.28),rgba(91,140,255,0) 30rem),radial-gradient(circle at 86% 78%,rgba(45,212,191,.18),rgba(45,212,191,0) 30rem),var(--bg); }
    .home-link { position:fixed; top:18px; left:18px; z-index:20; display:inline-flex; align-items:center; min-height:38px; padding:0 14px; border:1px solid var(--line); border-radius:8px; color:var(--text); text-decoration:none; font-weight:800; background:rgba(20,27,41,.84); box-shadow:0 16px 40px rgba(0,0,0,.26); }
    main { width:min(1120px,calc(100% - 32px)); margin:0 auto; padding:78px 0 36px; }
    .hero { display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:18px; }
    h1 { margin:0 0 10px; font-size:clamp(30px,5vw,54px); letter-spacing:0; }
    p { margin:0; color:var(--muted); line-height:1.75; }
    .badge { flex:0 0 auto; padding:8px 12px; border:1px solid rgba(45,212,191,.34); border-radius:999px; color:#b8fff3; font-size:13px; font-weight:900; background:rgba(45,212,191,.08); }
    .video-panel { overflow:hidden; border:1px solid var(--line); border-radius:8px; background:rgba(20,27,41,.86); box-shadow:0 24px 80px rgba(0,0,0,.34); }
    .video-shell { position:relative; display:grid; place-items:center; min-height:min(62vh,620px); padding:22px; background:linear-gradient(135deg,#08111f,#101827); }
    video { display:none; width:100%; max-height:min(72vh,720px); border-radius:8px; background:#000; }
    .load-card { width:min(560px,100%); padding:24px; border:1px solid var(--line); border-radius:8px; text-align:center; background:rgba(255,255,255,.07); }
    .load-card strong { display:block; margin-bottom:8px; font-size:24px; color:#fff; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; padding:14px; border-top:1px solid var(--line); }
    .button, button.button { display:inline-flex; align-items:center; justify-content:center; min-height:40px; padding:0 14px; border:1px solid var(--line); border-radius:8px; color:var(--text); font:inherit; font-weight:800; text-decoration:none; background:rgba(255,255,255,.07); cursor:pointer; }
    .button.primary { border-color:transparent; background:var(--blue); }
    @media (max-width:720px) { .hero { align-items:flex-start; flex-direction:column; } main { width:min(100vw - 24px,1120px); } }
  </style>
</head>
<body>

        <video id="introVideo" controls playsinline data-src="./ai-hub-tutorial.mp4"></video>

  <script>
    const button = document.querySelector("#loadVideo");
    const video = document.querySelector("#introVideo");
    const card = document.querySelector("#loadCard");
    button.addEventListener("click", () => {
      if (!video.src) {
        video.src = video.dataset.src;
        video.style.display = "block";
        card.style.display = "none";
        button.textContent = "\u64ad\u653e\u89c6\u9891";
      }
      video.play().catch(() => video.load());
    });
  </script>

</html>
