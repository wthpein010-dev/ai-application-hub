<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>飞书文件批量下载插件演示视频</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --line: #dce3ed;
        --text: #172033;
        --muted: #67758a;
        --teal: #167782;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      }

      .shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar,
      .viewer,
      .note {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 14px 16px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      .back {
        min-height: 36px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font-size: 14px;
      }

      .viewer {
        margin-top: 18px;
        overflow: hidden;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #0f172a;
      }

      .note {
        margin-top: 16px;
        padding: 16px;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .actions a {
        min-height: 36px;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font-size: 14px;
      }

      .actions .primary {
        border-color: #0d6570;
        background: var(--teal);
        color: #fff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>飞书文件批量下载插件演示视频</h1>
        <a class="back" href="../../../全部项目总览.html">返回主页</a>
      </header>

      <section class="viewer">
        <video controls preload="metadata" poster="./poster.png">
          <source src="./feishu-batch-downloader-demo.mp4" type="video/mp4" />
          当前浏览器不支持直接播放 MP4 视频。
        </video>
      </section>

      <section class="note">
        视频演示了从主页进入插件、加载扩展、打开飞书页面内嵌面板、筛选勾选文件、创建下载队列的完整流程。
        <div class="actions">
          <a class="primary" href="./feishu-batch-downloader-demo.mp4">打开视频文件</a>
          <a href="../README.md">查看安装说明</a>
          <a href="../feishu-batch-downloader-extension.zip">下载插件安装包</a>
        </div>
      </section>
    </main>
  </body>
</html>
