<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&#39134;&#20070;&#25991;&#20214;&#25209;&#37327;&#19979;&#36733;&#25554;&#20214;&#28436;&#31034;&#35270;&#39057;</title>
  <style>
    :root { color-scheme: light; --bg:#f5f7fb; --panel:#fff; --line:#dce3ed; --text:#172033; --muted:#67758a; --teal:#167782; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif; }
    .shell { width:min(1120px,calc(100% - 32px)); margin:0 auto; padding:78px 0 42px; }
    a { color:inherit; text-decoration:none; }
    .home-link { position:fixed; top:18px; left:18px; z-index:20; min-height:38px; display:inline-flex; align-items:center; padding:0 14px; border:1px solid var(--line); border-radius:8px; background:#fff; font-weight:800; box-shadow:0 12px 30px rgba(23,32,51,.12); }
    .topbar,.viewer,.note { border:1px solid var(--line); border-radius:8px; background:var(--panel); }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; padding:16px; }
    h1 { margin:0; font-size:28px; letter-spacing:0; }
    .viewer { display:grid; place-items:center; min-height:min(62vh,620px); margin-top:18px; overflow:hidden; background:#0f172a; }
    video { display:none; width:100%; max-height:72vh; background:#000; }
    .load-card { width:min(520px,100%); padding:24px; color:#eef4ff; text-align:center; }
    .load-card strong { display:block; margin-bottom:8px; font-size:22px; }
    .note { margin-top:16px; padding:16px; color:var(--muted); line-height:1.7; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .actions a,.actions button { min-height:36px; padding:9px 12px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--text); font:inherit; font-size:14px; cursor:pointer; }
    .actions .primary { border-color:#0d6570; background:var(--teal); color:#fff; font-weight:700; }
  </style>
</head>
<body>
  <a class="home-link" href="../../../index.html">&#36820;&#22238;&#20027;&#39029;</a>
  <main class="shell">
    <header class="topbar">
      <h1>&#39134;&#20070;&#25991;&#20214;&#25209;&#37327;&#19979;&#36733;&#25554;&#20214;&#28436;&#31034;&#35270;&#39057;</h1>
    </header>
    <section class="viewer">
      <div class="load-card" id="loadCard">
        <strong>&#20934;&#22791;&#25773;&#25918;&#28436;&#31034;&#35270;&#39057;</strong>
        <p>&#28857;&#20987;&#21518;&#20877;&#21152;&#36733; MP4&#65292;&#39029;&#38754;&#26412;&#36523;&#20250;&#26356;&#24555;&#25171;&#24320;&#12290;</p>
      </div>
      <video id="introVideo" controls playsinline data-src="./feishu-batch-downloader-demo.mp4"></video>
    </section>
    <section class="note">
      &#35270;&#39057;&#28436;&#31034;&#20174;&#20027;&#39029;&#36827;&#20837;&#25554;&#20214;&#12289;&#21152;&#36733;&#25193;&#23637;&#12289;&#25171;&#24320;&#39134;&#20070;&#39029;&#38754;&#20869;&#23982;&#38754;&#26495;&#12289;&#31579;&#36873;&#21246;&#36873;&#25991;&#20214;&#12289;&#21019;&#24314;&#19979;&#36733;&#38431;&#21015;&#30340;&#23436;&#25972;&#27969;&#31243;&#12290;
      <div class="actions">
        <button id="loadVideo" class="primary" type="button">&#21152;&#36733;&#35270;&#39057;</button>
        <a href="../README.md">&#26597;&#30475;&#23433;&#35013;&#35828;&#26126;</a>
        <a href="../feishu-batch-downloader-extension.zip">&#19979;&#36733;&#25554;&#20214;&#23433;&#35013;&#21253;</a>
        <a href="../../../index.html">&#36820;&#22238;&#20027;&#39029;</a>
      </div>
    </section>
  </main>
  <script>
    const button = document.querySelector("#loadVideo");
    const video = document.querySelector("#introVideo");
    const card = document.querySelector("#loadCard");
    button.addEventListener("click", () => {
      if (!video.src) {
        video.src = video.dataset.src;
        video.style.display = "block";
        card.style.display = "none";
        button.textContent = "\u64ad\u653e\u89c6\u9891";
      }
      video.play().catch(() => video.load());
    });
  </script>
</body>
</html>
