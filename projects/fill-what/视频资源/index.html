<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>填了个啥介绍视频</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #151b2f;
      --line: rgba(255, 255, 255, 0.14);
      --ink: #f8fafc;
      --muted: #aeb8cc;
      --blue: #5b8cff;
      --green: #3fd39f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(91, 140, 255, 0.32), transparent 30rem),
        radial-gradient(circle at 84% 80%, rgba(63, 211, 159, 0.22), transparent 28rem),
        var(--bg);
    }

    .home-link {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      background: rgba(21, 27, 47, 0.82);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }

    .home-link:hover {
      border-color: var(--blue);
      background: var(--blue);
    }

    main {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 78px 0 34px;
    }

    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .badge {
      flex: 0 0 auto;
      padding: 8px 12px;
      border: 1px solid rgba(63, 211, 159, 0.34);
      border-radius: 999px;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
      background: rgba(63, 211, 159, 0.08);
    }

    .video-panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(21, 27, 47, 0.84);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.36);
    }

    video {
      display: block;
      width: 100%;
      max-height: min(70vh, 720px);
      background: #000;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.07);
    }

    .button.primary {
      border-color: transparent;
      background: var(--blue);
    }

    @media (max-width: 680px) {
      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        width: min(100vw - 24px, 1080px);
      }
    }
  </style>
</head>
<body>
  <a class="home-link" href="../../../index.html">返回主页</a>
  <main>
    <section class="hero">
      <div>
        <h1>填了个啥介绍视频</h1>
        <p>通过一段演示视频了解这个成语填字与诗意来信小游戏的玩法、节奏和体验效果。</p>
      </div>
      <span class="badge">小游戏体验集合</span>
    </section>

    <section class="video-panel" aria-label="填了个啥介绍视频">
      <video src="./fill-what-intro.mp4" controls preload="metadata" playsinline></video>
      <div class="actions">
        <a class="button primary" href="../index.html">网页预览</a>
        <a class="button" href="./fill-what-intro.mp4">打开视频文件</a>
        <a class="button" href="../../../index.html">返回主页</a>
      </div>
    </section>
  </main>
</body>
</html>
